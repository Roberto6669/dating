<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Spark — Dating Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
  :root{
    --pink:#fd297b; --orange:#ff5864; --purple:#8a2be2;
    --grad:linear-gradient(135deg,#fd297b 0%,#ff5864 50%,#ff655b 100%);
    --bg:#f5f5f7; --card-shadow:0 12px 40px rgba(0,0,0,.18);
    --ink:#222; --muted:#8a8a8f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#e9e9ee;color:var(--ink);overflow:hidden}
  #root{height:100vh;display:flex;align-items:center;justify-content:center}

  /* phone frame */
  .phone{position:relative;width:100%;max-width:430px;height:100vh;max-height:932px;background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  @media(min-width:480px){.phone{border-radius:38px;height:92vh;margin:0 auto}}

  /* header */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;background:#fff;border-bottom:1px solid #eee;z-index:5}
  .logo{font-weight:800;font-size:24px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px}
  .icon-btn{border:none;background:transparent;font-size:22px;cursor:pointer;color:#9a9a9f;width:40px;height:40px;border-radius:50%}
  .icon-btn:hover{background:#f3f3f6;color:var(--pink)}

  /* deck */
  .deck-wrap{flex:1;position:relative;overflow:hidden}
  .deck{position:absolute;inset:0;padding:14px}
  .card{position:absolute;inset:14px;border-radius:22px;background:#ddd center/cover no-repeat;box-shadow:var(--card-shadow);
    overflow:hidden;cursor:grab;user-select:none;will-change:transform;display:flex;flex-direction:column;justify-content:flex-end}
  .card:active{cursor:grabbing}
  .card .scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.15) 45%,transparent 70%)}
  .card .info{position:relative;color:#fff;padding:20px 20px 22px;z-index:2}
  .card .name{font-size:27px;font-weight:700;display:flex;align-items:baseline;gap:10px}
  .card .name .age{font-size:23px;font-weight:400}
  .card .meta{font-size:14px;opacity:.92;margin-top:4px;display:flex;align-items:center;gap:6px}
  .card .bio{font-size:14px;opacity:.92;margin-top:10px;line-height:1.4}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
  .tag{background:rgba(255,255,255,.22);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.35);
    color:#fff;font-size:12px;padding:5px 11px;border-radius:20px}
  .intent-pill{display:inline-block;background:rgba(255,255,255,.95);color:var(--pink);font-weight:700;
    font-size:11px;letter-spacing:.4px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-top:10px}

  /* swipe stamps */
  .stamp{position:absolute;top:38px;font-size:34px;font-weight:900;letter-spacing:2px;padding:6px 16px;
    border:5px solid;border-radius:12px;opacity:0;z-index:3;transition:opacity .05s}
  .stamp.like{left:24px;color:#3df27d;border-color:#3df27d;transform:rotate(-18deg)}
  .stamp.nope{right:24px;color:#ff4458;border-color:#ff4458;transform:rotate(18deg)}

  /* action buttons */
  .actions{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 0 20px;background:transparent}
  .act{width:60px;height:60px;border-radius:50%;border:none;background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.14);
    font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}
  .act:hover{transform:scale(1.1)}
  .act.small{width:48px;height:48px;font-size:20px}
  .act.nope{color:#ff4458}.act.like{color:#3df27d}.act.star{color:#1ec3ff}.act.rewind{color:#ffb02e}.act.boost{color:#b25cff}

  /* empty deck */
  .empty{position:absolute;inset:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);gap:14px;padding:30px}
  .empty h3{color:var(--ink);font-size:20px}
  .btn{background:var(--grad);color:#fff;border:none;padding:13px 26px;border-radius:30px;font-weight:700;font-size:15px;cursor:pointer}

  /* bottom nav */
  .nav{display:flex;background:#fff;border-top:1px solid #eee;padding:10px 0 14px}
  .nav button{flex:1;border:none;background:transparent;font-size:24px;color:#c4c4cc;cursor:pointer;position:relative}
  .nav button.active{color:var(--pink)}
  .badge{position:absolute;top:-2px;right:30%;background:var(--orange);color:#fff;font-size:10px;font-weight:700;
    min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* filter / matches panels */
  .panel{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:#fff;border-bottom:1px solid #eee}
  .panel-head h2{font-size:19px}
  .panel-body{flex:1;overflow-y:auto;padding:20px}
  .field{margin-bottom:26px}
  .field label{display:block;font-weight:600;font-size:14px;margin-bottom:10px;color:#444}
  .field .val{color:var(--pink);font-weight:700}
  input[type=range]{width:100%;accent-color:var(--pink)}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg button{flex:1;min-width:80px;border:1.5px solid #e0e0e6;background:#fff;color:#555;padding:11px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--grad);color:#fff;border-color:transparent}
  .apply{margin:10px 20px 22px}

  /* matches grid */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mcard{border-radius:16px;overflow:hidden;position:relative;aspect-ratio:3/4;background:#ddd center/cover;box-shadow:0 4px 14px rgba(0,0,0,.1)}
  .mcard .mscrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent 55%)}
  .mcard .mname{position:absolute;bottom:10px;left:12px;color:#fff;font-weight:600;font-size:15px;z-index:2}
  .new-flag{position:absolute;top:8px;left:8px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;z-index:2}
  .matches-empty{text-align:center;color:var(--muted);padding:60px 30px}

  /* match popup */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:40;display:flex;align-items:center;justify-content:center;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .match-modal{background:var(--grad);width:88%;max-width:360px;border-radius:26px;padding:34px 26px;text-align:center;color:#fff}
  .match-modal h2{font-size:34px;font-weight:800;font-style:italic;margin-bottom:8px}
  .match-modal p{opacity:.95;font-size:15px;margin-bottom:22px}
  .match-avatars{display:flex;justify-content:center;margin-bottom:22px}
  .match-avatars img{width:96px;height:96px;border-radius:50%;border:4px solid #fff;object-fit:cover}
  .match-avatars img:nth-child(2){margin-left:-22px}
  .match-modal .btn-w{display:block;width:100%;background:#fff;color:var(--pink);border:none;padding:14px;border-radius:30px;font-weight:700;margin-bottom:12px;cursor:pointer}
  .match-modal .btn-ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.6)}
</style>
</head>
