  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5}

  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 22px rgba(27,102,255,.32)}
  .btn-white{background:#fff;color:var(--c1)}
  .btn-ghost{background:transparent;border:2px solid rgba(255,255,255,.8);color:#fff}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-block{display:block;width:100%}

  /* ===== NAV ===== */
  header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
  .logo{font-weight:900;font-size:26px;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo .dot{color:var(--c2)}
  .nav-links{display:flex;gap:28px;align-items:center}
  .nav-links a{font-weight:600;font-size:15px;color:#43496a}
  .nav-links a:hover{color:var(--c1)}
  .nav-right{display:flex;gap:12px;align-items:center}
  .link-btn{background:none;border:none;font-weight:700;font-size:15px;color:var(--c1);cursor:pointer}
  @media(max-width:820px){.nav-links{display:none}}

  /* ===== HERO ===== */
  .hero{position:relative;background:var(--grad);color:#fff;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-160px;top:-160px;width:520px;height:520px;border-radius:50%;background:rgba(255,255,255,.12)}
  .hero::before{content:"";position:absolute;left:-120px;bottom:-180px;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,.10)}
  .hero-inner{position:relative;z-index:2;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center;padding:72px 0 84px}
  .hero h1{font-size:62px;line-height:1.03;font-weight:900;letter-spacing:-1.5px;margin-bottom:18px}
  .hero p.sub{font-size:20px;opacity:.95;max-width:480px;margin-bottom:30px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  .hero-trust{margin-top:26px;font-size:14px;opacity:.9;display:flex;align-items:center;gap:10px}
  .avatars{display:flex}
  .avatars img{width:34px;height:34px;border-radius:50%;border:2px solid #fff;object-fit:cover;margin-left:-10px}
  .avatars img:first-child{margin-left:0}
  /* hero card stack */
  .hero-art{position:relative;height:440px}
  .h-card{position:absolute;width:260px;height:360px;border-radius:24px;background-size:cover;background-position:center;box-shadow:0 24px 60px rgba(7,20,60,.35);overflow:hidden}
  .h-card .hc-info{position:absolute;left:0;right:0;bottom:0;padding:16px;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);font-weight:700}
  .h-card.c-a{left:calc(50% - 150px);top:30px;transform:rotate(-8deg);z-index:1}
  .h-card.c-b{left:calc(50% - 110px);top:10px;transform:rotate(7deg);z-index:2}
  .h-badge{position:absolute;z-index:5;background:#fff;color:var(--c1);font-weight:800;border-radius:30px;padding:8px 14px;box-shadow:0 8px 20px rgba(0,0,0,.18);font-size:14px}
  .h-badge.like{top:64px;right:36px;color:#16c79a}
  .h-badge.nope{bottom:74px;left:24px;color:#ff5470}
  @media(max-width:900px){
    .hero-inner{grid-template-columns:1fr;text-align:center;padding:52px 0 60px}
    .hero h1{font-size:44px}
    .hero p.sub{margin-left:auto;margin-right:auto}
    .hero-cta{justify-content:center}
    .hero-trust{justify-content:center}
    .hero-art{display:none}
  }

  /* ===== SECTION GENERIC ===== */
  section.block{padding:84px 0}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 52px}
  .sec-head .eyebrow{color:var(--c1);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-size:13px;margin-bottom:12px}
  .sec-head h2{font-size:40px;font-weight:900;letter-spacing:-1px;margin-bottom:14px}
  .sec-head p{font-size:18px;color:var(--muted)}

  /* how it works */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .step{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:32px 26px;text-align:center;transition:transform .15s,box-shadow .15s}
  .step:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(16,24,58,.10)}
  .step .ic{width:64px;height:64px;border-radius:18px;background:var(--grad-soft);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px}
  .step h3{font-size:20px;margin-bottom:8px}
  .step p{color:var(--muted);font-size:15px}
  @media(max-width:820px){.steps{grid-template-columns:1fr}}

  /* features alt section */
  .feat{background:var(--grad-soft)}
  .feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .feat-card{background:#fff;border-radius:var(--radius);padding:26px 22px;border:1px solid var(--line)}
  .feat-card .ic{font-size:26px;margin-bottom:12px}
  .feat-card h4{font-size:17px;margin-bottom:6px}
  .feat-card p{color:var(--muted);font-size:14px}
  @media(max-width:900px){.feat-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:540px){.feat-grid{grid-template-columns:1fr}}

  /* stories */
  .stories{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .story{border-radius:var(--radius);overflow:hidden;position:relative;min-height:380px;background-size:cover;background-position:center;display:flex;align-items:flex-end;box-shadow:0 12px 30px rgba(16,24,58,.12)}
  .story .st-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,16,45,.9),transparent 60%)}
  .story .st-txt{position:relative;z-index:2;color:#fff;padding:24px}
  .story .st-txt h4{font-size:20px;margin-bottom:6px}
  .story .st-txt p{font-size:14px;opacity:.92}
  @media(max-width:900px){.stories{grid-template-columns:1fr}}

  /* CTA band */
  .cta-band{background:var(--grad);color:#fff;text-align:center;border-radius:28px;padding:56px 24px;margin:0 auto}
  .cta-band h2{font-size:38px;font-weight:900;letter-spacing:-1px;margin-bottom:14px}
  .cta-band p{font-size:18px;opacity:.95;margin-bottom:26px}

  /* footer */
  footer{background:var(--ink);color:#cfd4e6;padding:56px 0 30px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:30px;margin-bottom:36px}
  footer .logo{font-size:24px}
  footer h5{color:#fff;font-size:14px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
  footer ul{list-style:none}
  footer li{margin-bottom:10px}
  footer a{color:#aab1cc;font-size:14px}
  footer a:hover{color:#fff}
  .foot-bottom{border-top:1px solid rgba(255,255,255,.12);padding-top:22px;font-size:13px;color:#8088a6;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  @media(max-width:820px){.foot-grid{grid-template-columns:1fr 1fr}}

  /* ===== AUTH MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(8,14,38,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;width:100%;max-width:420px;border-radius:24px;padding:34px 30px;position:relative;animation:pop .22s}
  @keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .x{position:absolute;top:16px;right:18px;border:none;background:none;font-size:24px;color:#aaa;cursor:pointer}
  .modal .logo{font-size:30px;text-align:center;margin-bottom:6px}
  .modal .tagline{text-align:center;color:var(--muted);margin-bottom:22px;font-size:15px}
  .tabs{display:flex;background:#f1f3fa;border-radius:30px;padding:5px;margin-bottom:22px}
  .tabs button{flex:1;border:none;background:none;padding:10px;border-radius:26px;font-weight:700;color:#69708a;cursor:pointer}
  .tabs button.on{background:#fff;color:var(--c1);box-shadow:0 2px 8px rgba(0,0,0,.08)}

  .form input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;outline:none}

  .form .btn{margin-top:20px}
  .modal .fine{text-align:center;font-size:12px;color:var(--muted);margin-top:16px}

  .ex-shell{min-height:100vh;background:#f4f6fb;display:flex;flex-direction:column}

  .ex-tabs button{border:none;background:none;padding:9px 20px;border-radius:26px;font-weight:700;color:#69708a;cursor:pointer;font-size:14px}

  .pcard{width:100%;max-width:460px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 18px 50px rgba(16,24,58,.16);position:relative}

  .pactions{display:flex;align-items:center;justify-content:center;gap:18px;padding:18px 0 26px}
  .act{width:62px;height:62px;border-radius:50%;border:none;background:#fff;box-shadow:0 8px 20px rgba(16,24,58,.16);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}

  .act.sm{width:50px;height:50px;font-size:20px}
  .act.pass{color:#ff5470}.act.like{color:#16c79a}.act.star{color:#1b9dff}.act.rewind{color:#ffb02e}
  .empty{background:#fff;border:1px solid var(--line);border-radius:24px;padding:60px 30px;text-align:center;max-width:460px;width:100%}
  .empty .big{font-size:54px;margin-bottom:14px}
  .empty h3{font-size:22px;margin-bottom:8px}
  .empty p{color:var(--muted);margin-bottom:20px}

  /* matches grid */
  .mtitle{font-size:22px;font-weight:800;margin-bottom:18px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
  .mcard{border-radius:16px;overflow:hidden;position:relative;aspect-ratio:3/4;background-size:cover;background-position:center;box-shadow:0 6px 18px rgba(16,24,58,.12)}
  .mcard .mscrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,16,45,.8),transparent 55%)}
  .mcard .mnm{position:absolute;left:12px;bottom:10px;color:#fff;font-weight:700;font-size:15px;z-index:2}
  .flag{position:absolute;top:8px;left:8px;background:var(--c2);color:#06352f;font-weight:800;font-size:10px;padding:3px 9px;border-radius:10px;z-index:2}
  .m-empty{background:#fff;border:1px solid var(--line);border-radius:20px;padding:54px 30px;text-align:center;color:var(--muted)}

  /* match popup */
  .match-modal{background:var(--grad);width:100%;max-width:380px;border-radius:26px;padding:36px 28px;text-align:center;color:#fff}
  .match-modal h2{font-size:34px;font-weight:900;font-style:italic;margin-bottom:8px}
  .match-modal p{opacity:.95;margin-bottom:22px}
  .m-avs{display:flex;justify-content:center;margin-bottom:22px}
  .m-avs img{width:96px;height:96px;border-radius:50%;border:4px solid #fff;object-fit:cover}
  .m-avs img:nth-child(2){margin-left:-20px}
</style>
</head>
